<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доставка еды</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #222;
            padding-bottom: 200px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .header {
            background: linear-gradient(135deg, #e65100, #bf360c);
            color: #fff;
            padding: 18px 16px 14px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 2px;
        }
        .categories {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 80px;
            z-index: 5;
            white-space: nowrap;
        }
        .cat-btn {
            flex-shrink: 0;
            padding: 10px 22px;
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            color: #444;
            transition: 0.2s;
        }
        .cat-btn.active {
            background: #e65100;
            color: #fff;
            box-shadow: 0 4px 10px rgba(230, 81, 0, 0.3);
        }
        /* Плитка: 2 колонки на мобильном */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }
        .food-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .food-card:active {
            transform: scale(0.98);
        }
        .food-img {
            height: 130px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
        }
        .food-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .food-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .food-info h3 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.2;
        }
        .food-info .desc {
            font-size: 11px;
            color: #777;
            line-height: 1.3;
            flex: 1;
        }
        .food-info .price {
            font-size: 17px;
            font-weight: 800;
            color: #e65100;
        }
        .add-btn {
            margin-top: 6px;
            background: #e65100;
            color: white;
            border: none;
            padding: 12px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            width: 100%;
        }
        .add-btn:active {
            background: #bf360c;
            transform: scale(0.96);
        }
        /* Корзина */
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 20;
            padding: 16px;
            max-height: 60vh;
            display: flex;
            flex-direction: column;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-header h2 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-badge {
            background: #e65100;
            color: #fff;
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 14px;
        }
        .toggle-icon {
            font-size: 20px;
        }
        .cart-body {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
            overflow-y: auto;
            max-height: 45vh;
        }
        .cart-body.open {
            display: flex;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-name {
            font-weight: 600;
            font-size: 15px;
        }
        .cart-item-meta {
            font-size: 13px;
            color: #777;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ctrl-btn {
            background: #f0f0f0;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .ctrl-btn:active {
            background: #ddd;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e65100;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .summary {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            margin-top: 6px;
        }
        .address-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eee;
            border-radius: 14px;
            font-size: 16px;
            margin-top: 8px;
            outline: none;
        }
        .address-input:focus {
            border-color: #e65100;
        }
        .whatsapp-btn {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .whatsapp-btn:disabled {
            background: #bbb;
            cursor: not-allowed;
        }
        .whatsapp-btn:active:not(:disabled) {
            background: #1ebe57;
        }
        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🍣 Пицца · Суши · Чикен</h1>
    <p>Быстрая доставка</p>
</div>

<div class="categories" id="categoryContainer">
    <button class="cat-btn active" data-cat="all">Все</button>
    <button class="cat-btn" data-cat="sushi">Суши</button>
    <button class="cat-btn" data-cat="pizza">Пицца</button>
    <button class="cat-btn" data-cat="chicken">Чикен</button>
</div>

<div class="menu-grid" id="menuContainer"></div>

<div class="cart-panel">
    <div class="cart-header" id="cartToggle">
        <h2>🛒 Корзина <span class="cart-badge" id="cartCount">0</span></h2>
        <span class="toggle-icon" id="toggleArrow">▼</span>
    </div>
    <div class="cart-body open" id="cartBody">
        <div id="cartItems"></div>
        <div class="summary" id="summaryRow" style="display:none;">
            <span>Итого</span>
            <span id="totalPrice">0 ₽</span>
        </div>
        <input class="address-input" type="text" id="addressInput" placeholder="Введите адрес доставки">
        <button class="whatsapp-btn" id="orderButton" disabled>
            📱 Заказать в WhatsApp
        </button>
        <div class="empty-message" id="emptyCartMsg">Корзина пуста</div>
    </div>
</div>

<script>
    // Меню (замените URL картинок на свои)
    const products = [
        // Суши
        { id: 1, cat: 'sushi', name: 'Филадельфия', desc: 'Лосось, сыр, авокадо', price: 590, emoji: '🍣' },
        { id: 2, cat: 'sushi', name: 'Калифорния', desc: 'Краб, огурец, икра', price: 520, emoji: '🍣' },
        { id: 3, cat: 'sushi', name: 'Ролл с угрём', desc: 'Угорь, соус унаги', price: 640, emoji: '🍣' },
        { id: 4, cat: 'sushi', name: 'Сет Микс', desc: '20 шт. популярных', price: 1190, emoji: '🍱' },
        // Пицца (с фото)
        { id: 5, cat: 'pizza', name: 'Пепперони', desc: 'Колбаски, моцарелла', price: 680, image: 'https://i.imgur.com/4jU6xZv.jpg' },
        { id: 6, cat: 'pizza', name: 'Маргарита', desc: 'Томаты, базилик', price: 550, image: 'https://i.imgur.com/L0YF9aB.jpg' },
        { id: 7, cat: 'pizza', name: 'Чикен BBQ', desc: 'Курица, соус BBQ', price: 720, image: 'https://i.imgur.com/3pRqvPq.jpg' },
        { id: 8, cat: 'pizza', name: 'Мясная', desc: 'Бекон, ветчина, фарш', price: 790, image: 'https://i.imgur.com/kJ7t4Qo.jpg' },
        // Чикен
        { id: 9, cat: 'chicken', name: 'Крылья острые', desc: '6 шт., соус чили', price: 450, emoji: '🍗' },
        { id: 10, cat: 'chicken', name: 'Стрипсы', desc: '5 шт., сырный соус', price: 410, emoji: '🍗' },
        { id: 11, cat: 'chicken', name: 'Чикен бокс', desc: 'Ножки, фри, напиток', price: 620, emoji: '🍗' },
        { id: 12, cat: 'chicken', name: 'Бургер', desc: 'Котлета, салат', price: 370, emoji: '🍔' },
    ];

    let cart = {};
    let activeCategory = 'all';

    const menuContainer = document.getElementById('menuContainer');
    const categoryButtons = document.querySelectorAll('.cat-btn');
    const cartItemsDiv = document.getElementById('cartItems');
    const cartCountSpan = document.getElementById('cartCount');
    const totalPriceSpan = document.getElementById('totalPrice');
    const summaryRow = document.getElementById('summaryRow');
    const orderBtn = document.getElementById('orderButton');
    const addressInput = document.getElementById('addressInput');
    const emptyCartMsg = document.getElementById('emptyCartMsg');
    const cartBody = document.getElementById('cartBody');
    const toggleArrow = document.getElementById('toggleArrow');

    function renderMenu() {
        const filtered = activeCategory === 'all'
            ? products
            : products.filter(p => p.cat === activeCategory);

        menuContainer.innerHTML = filtered.map(p => {
            const imgHtml = p.image
                ? `<img src="${p.image}" alt="${p.name}">`
                : p.emoji;
            return `
                <div class="food-card">
                    <div class="food-img">${imgHtml}</div>
                    <div class="food-info">
                        <h3>${p.name}</h3>
                        <div class="desc">${p.desc}</div>
                        <div class="price">${p.price} ₽</div>
                        <button class="add-btn" data-id="${p.id}">➕</button>
                    </div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                addToCart(id);
            });
        });
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        if (cart[id]) {
            cart[id].qty += 1;
        } else {
            cart[id] = { ...product, qty: 1 };
        }
        updateCart();
        if (!cartBody.classList.contains('open')) {
            cartBody.classList.add('open');
            toggleArrow.textContent = '▲';
        }
    }

    function changeQty(id, delta) {
        if (!cart[id]) return;
        cart[id].qty += delta;
        if (cart[id].qty <= 0) {
            delete cart[id];
        }
        updateCart();
    }

    function removeItem(id) {
        delete cart[id];
        updateCart();
    }

    function updateCart() {
        const items = Object.values(cart);
        const totalQty = items.reduce((sum, i) => sum + i.qty, 0);
        const total = items.reduce((sum, i) => sum + i.price * i.qty, 0);

        cartCountSpan.textContent = totalQty;
        totalPriceSpan.textContent = total + ' ₽';

        const address = addressInput.value.trim();
        orderBtn.disabled = totalQty === 0 || address.length < 3;

        if (totalQty === 0) {
            emptyCartMsg.style.display = 'block';
            summaryRow.style.display = 'none';
        } else {
            emptyCartMsg.style.display = 'none';
            summaryRow.style.display = 'flex';
        }

        cartItemsDiv.innerHTML = items.map(item => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-meta">${item.price} ₽ × ${item.qty}</div>
                </div>
                <div class="cart-item-controls">
                    <button class="ctrl-btn" data-id="${item.id}" data-action="minus">−</button>
                    <span style="font-weight:600;">${item.qty}</span>
                    <button class="ctrl-btn" data-id="${item.id}" data-action="plus">+</button>
                    <button class="delete-btn" data-id="${item.id}">🗑️</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                if (btn.dataset.action === 'plus') addToCart(id);
                else changeQty(id, -1);
            });
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                removeItem(parseInt(btn.dataset.id));
            });
        });
    }

    function buildWhatsAppLink() {
        const phone = '7058264449'; // ⚠️ ЗАМЕНИТЕ НА СВОЙ НОМЕР (без '+')
        const address = addressInput.value.trim();
        const items = Object.values(cart);
        let message = ` *Новый заказ!*\n`;
        message += ` *Адрес доставки:* ${address}\n\n`;
        message += `*Состав заказа:*\n`;
        items.forEach(i => {
            message += `• ${i.name} x${i.qty} = ${i.price * i.qty}₽\n`;
        });
        const total = items.reduce((s, i) => s + i.price * i.qty, 0);
        message += `\n *Итого: ${total}₽*`;
        const text = encodeURIComponent(message);
        return `https://wa.me/${phone}?text=${text}`;
    }

    orderBtn.addEventListener('click', () => {
        const link = buildWhatsAppLink();
        if (link) window.open(link, '_blank');
    });

    addressInput.addEventListener('input', updateCart);

    categoryButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            categoryButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.dataset.cat;
            renderMenu();
        });
    });

    document.getElementById('cartToggle').addEventListener('click', () => {
        cartBody.classList.toggle('open');
        toggleArrow.textContent = cartBody.classList.contains('open') ? '▲' : '▼';
    });

    renderMenu();
    updateCart();
</script>

</body>
</html>
